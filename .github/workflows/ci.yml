name: CI

on:
  push:
    branches:
      - main
      - version-15
      - version-16
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout app
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Run Ruff
        run: ruff check .

  server-tests:
    name: Server Tests (${{ matrix.erpnext_branch }})
    runs-on: ubuntu-22.04
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - erpnext_branch: version-15
            python_version: "3.11"
          - erpnext_branch: version-16
            python_version: "3.14"

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=5

    env:
      FRAPPE_BRANCH: ${{ matrix.erpnext_branch }}
      ERPNEXT_BRANCH: ${{ matrix.erpnext_branch }}

    steps:
      - name: Checkout app
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          check-latest: true

      - name: Add test host
        run: echo "127.0.0.1 test_site" | sudo tee -a /etc/hosts

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.erpnext_branch }}-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.erpnext_branch }}-
            ${{ runner.os }}-pip-

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install bench and app stack
        run: bash ${GITHUB_WORKSPACE}/.github/helper/install.sh

      - name: Run server tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app za_local
